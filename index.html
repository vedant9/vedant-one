<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vedant.one</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0c0c0c;
  overflow: hidden;
  font-family: 'Manrope', sans-serif;
  color: white;
}

/* Particle canvas */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Grid */
.grid {
  position: fixed;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 28px 28px;
  animation: gridMove 45s linear infinite;
  z-index: 1;
  pointer-events: none;
}

@keyframes gridMove { from { transform: translate(0,0); } to { transform: translate(-28px,-28px); } }

/* Light sweep overlay */
.light-sweep {
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.05) 50%, transparent 60%);
  animation: sweep 10s linear infinite;
  z-index: 2;
  pointer-events: none;
}

/* Wrapper and container */
.wrapper {
  position: relative;
  z-index: 3;
  height: 100%;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  text-align: center;
  max-width: 700px;
  padding: 20px;
  backdrop-filter: blur(5px);
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}

/* Headline - Optima */
h1 {
  font-family: 'Optima', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 400; /* regular, not bold */
  font-size: 68px;
  letter-spacing: 1px;
  margin-bottom: 30px;
  opacity: 0;
  text-shadow: 0 0 6px rgba(255,255,255,0.12);
}

/* Circular orbit loader */
.loader {
  position: relative;
  width: 90px;
  height: 90px;
  margin: 30px auto;
}

.orbit {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  animation: rotate linear infinite;
}

.orbit1 { animation-duration: 4s; }
.orbit2 { animation-duration: 6s; }
.orbit3 { animation-duration: 8s; }

.dot {
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: -6px; left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 10px rgba(255,255,255,0.8);
}

@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Text */
.main-text { font-size: 20px; line-height: 1.7; font-weight: 400; opacity: 0; transform: translateY(15px); animation: reveal 1s ease forwards; animation-delay: 2.2s; }
.small-text { font-size: 14px; font-weight: 300; opacity: 0.45; transform: translateY(15px); animation: reveal 1s ease forwards; animation-delay: 3.2s; }
.cursor::after { content: "/"; margin-left: 6px; animation: blink 1s infinite; }

/* Shooting stars */
.shooting-star { position: fixed; top: -10%; left: 60%; width: 2px; height: 100px; background: linear-gradient(white, transparent); transform: rotate(45deg); animation: shoot 1.2s linear forwards; opacity: 0.7; z-index: 4; }

/* Broken TV / glitch animation */
@keyframes tv-glitch {
  0% { transform: translate(0,0) skew(0deg,0deg); opacity:1; }
  20% { transform: translate(-5px,3px) skew(0.5deg,-0.5deg); opacity:0.8; }
  40% { transform: translate(5px,-3px) skew(-0.5deg,0.5deg); opacity:0.9; }
  60% { transform: translate(-3px,5px) skew(0.3deg,-0.3deg); opacity:0.85; }
  80% { transform: translate(3px,-5px) skew(-0.3deg,0.3deg); opacity:0.9; }
  100% { transform: translate(0,0) skew(0deg,0deg); opacity:1; }
}

/* Keyframes */
@keyframes reveal { to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { to { opacity:1; } }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
@keyframes shoot { to { transform: translate(-800px,800px) rotate(45deg); opacity:0; } }

</style>
</head>

<body>
<canvas id="particles"></canvas>
<div class="grid"></div>
<div class="light-sweep"></div>

<div class="wrapper">
  <div class="container">
    <h1 id="headline">vedant.one</h1>

    <!-- Fancy Circular Loader -->
    <div class="loader">
      <div class="orbit orbit1"><div class="dot"></div></div>
      <div class="orbit orbit2"><div class="dot"></div></div>
      <div class="orbit orbit3"><div class="dot"></div></div>
    </div>

    <p class="main-text cursor">
      Good things take time.<br>
      Your patience is highly appreciated.
    </p>

    <p class="small-text">
      (Also… the owner of this domain might be slightly lazy.<br>
      But something interesting is definitely loading.)
    </p>
  </div>
</div>

<script>
// ===== Particle system =====
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
let particles = [];
const particleCount = 45;
const maxDistance = 140;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resize);
resize();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.radius = Math.random() * 1.2 + 0.6;
  }
  move() { this.x += this.vx; this.y += this.vy; if(this.x<0||this.x>canvas.width)this.vx*=-1; if(this.y<0||this.y>canvas.height)this.vy*=-1; }
  draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.fill(); }
}

function initParticles() { particles=[]; for(let i=0;i<particleCount;i++){particles.push(new Particle());} }
function connectParticles() {
  for(let a=0;a<particles.length;a++){for(let b=a;b<particles.length;b++){
    const dx=particles[a].x-particles[b].x, dy=particles[a].y-particles[b].y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<maxDistance){ctx.strokeStyle=`rgba(255,255,255,${0.08*(1-dist/maxDistance)})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(particles[a].x,particles[a].y);ctx.lineTo(particles[b].x,particles[b].y);ctx.stroke();}}}}
function animateParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.move();p.draw();});connectParticles();requestAnimationFrame(animateParticles);}
initParticles();animateParticles();

// ===== TV power-on headline =====
const headline=document.getElementById("headline"); let flickers=0;
function tvTurnOn(){const interval=setInterval(()=>{headline.style.opacity=Math.random()>0.5?0.8:0.2; flickers++; if(flickers>20){clearInterval(interval); headline.style.opacity=1;}},50);}
tvTurnOn();

// ===== Shooting stars =====
function shootingStar(){const star=document.createElement("div"); star.className="shooting-star"; star.style.left=Math.random()*100+"%"; star.style.top=Math.random()*50+"%"; document.body.appendChild(star); setTimeout(()=>star.remove(),1200);}
setInterval(shootingStar, Math.random()*2000+1000);

// ===== Broken TV / glitch animation =====
const container = document.querySelector('.container');
setInterval(() => {
  container.style.animation = 'tv-glitch 0.3s';
  setTimeout(()=>{container.style.animation='';},300);
}, 5000 + Math.random()*2000);

</script>
</body>
</html>
