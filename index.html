<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vedant.one</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0c0c0c;
  font-family: 'Manrope', sans-serif;
  color: white;
  overflow: hidden;
}

/* ===== Particle Canvas ===== */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ===== Base Grid ===== */
.grid {
  position: fixed;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 28px 28px;
  animation: gridMove 45s linear infinite;
  z-index: 1;
}

@keyframes gridMove {
  from { transform: translate(0,0); }
  to { transform: translate(-28px,-28px); }
}

/* ===== Light Sweep Overlay ===== */
.light-sweep {
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    115deg,
    transparent 40%,
    rgba(255,255,255,0.05) 50%,
    transparent 60%
  );
  animation: sweep 10s linear infinite;
  z-index: 2;
  pointer-events: none;
}

@keyframes sweep {
  0% { transform: translateX(-60%) translateY(-60%); }
  100% { transform: translateX(60%) translateY(60%); }
}

/* ===== Content ===== */
.container {
  position: relative;
  z-index: 3;
  text-align: center;
  max-width: 700px;
  padding: 20px;
}

h1 {
  font-family: 'DM Serif Display', serif;
  font-weight: 400;
  font-size: 68px;
  letter-spacing: 1.5px;
  margin-bottom: 30px;
  opacity: 0;
  transform: translateY(15px);
  animation: reveal 1s ease forwards;
  animation-delay: 0.6s;
}

/* ===== Loader ===== */
.loader {
  width: 90px;
  height: 90px;
  margin: 30px auto;
  position: relative;
  opacity: 0;
  animation: fadeIn 1s ease forwards;
  animation-delay: 1.4s;
}

.loader .ring {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
}

.loader .core {
  position: absolute;
  width: 26px;
  height: 26px;
  background: white;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: breathe 3s ease-in-out infinite;
}

.loader .orbit {
  position: absolute;
  width: 100%;
  height: 100%;
  animation: rotate 6s linear infinite;
}

.loader .satellite {
  position: absolute;
  width: 8px;
  height: 8px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes breathe {
  0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
  50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
}

.main-text {
  font-size: 20px;
  line-height: 1.7;
  font-weight: 400;
  opacity: 0;
  transform: translateY(15px);
  animation: reveal 1s ease forwards;
  animation-delay: 2.2s;
}

.small-text {
  font-size: 14px;
  font-weight: 300;
  opacity: 0.45;
  transform: translateY(15px);
  animation: reveal 1s ease forwards;
  animation-delay: 3.2s;
}

@keyframes reveal {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.cursor::after {
  content: "/";
  margin-left: 6px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="grid"></div>
<div class="light-sweep"></div>

<div class="container">
  <h1>vedant.one</h1>

  <div class="loader">
    <div class="ring"></div>
    <div class="core"></div>
    <div class="orbit">
      <div class="satellite"></div>
    </div>
  </div>

  <p class="main-text cursor">
    Good things take time.<br>
    Your patience is highly appreciated.
  </p>

  <p class="small-text">
    (Also… the owner of this domain might be slightly lazy.<br>
    But something interesting is definitely loading.)
  </p>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];
const particleCount = 45;
const maxDistance = 140;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.radius = Math.random() * 1.2 + 0.6;
  }

  move() {
    this.x += this.vx;
    this.y += this.vy;

    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.fill();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < particleCount; i++) {
    particles.push(new Particle());
  }
}

function connect() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a; b < particles.length; b++) {
      const dx = particles[a].x - particles[b].x;
      const dy = particles[a].y - particles[b].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < maxDistance) {
        ctx.strokeStyle = "rgba(255,255,255," + (0.08 * (1 - distance / maxDistance)) + ")";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.move();
    p.draw();
  });

  connect();
  requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
